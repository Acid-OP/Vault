services:
  # ── Infrastructure ──────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:5432"
    env_file: docker/.env
    volumes:
      - pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Application services ────────────────────────
  http:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
      args:
        APP: http
    restart: unless-stopped
    ports:
      - "${HTTP_PORT}:${HTTP_PORT}"
    env_file: docker/.env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  ws:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
      args:
        APP: ws
    restart: unless-stopped
    ports:
      - "${WS_PORT}:${WS_PORT}"
    env_file: docker/.env
    depends_on:
      redis:
        condition: service_healthy

  mm:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
      args:
        APP: mm
    restart: unless-stopped
    env_file: docker/.env
    depends_on:
      - http

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    restart: unless-stopped
    ports:
      - "${WEB_PORT}:3000"
    env_file: docker/.env
    depends_on:
      - http
      - ws

volumes:
  pgdata:
  redisdata:
